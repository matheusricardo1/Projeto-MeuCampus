services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ufam-academics-api
    env_file:
      - ./api/.env
    environment:
      PORT: 3001
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  ecampus-worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ufam-academics-ecampus-worker
    command: ["node", "dist/worker.js"]
    env_file:
      - ./api/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      ECAMPUS_SCRAPE_QUEUE: ecampus:scrape
      ECAMPUS_SCRAPE_WORKER_CONCURRENCY: 2
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ufam-academics-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
