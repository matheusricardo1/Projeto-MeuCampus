services:

  ai-worker:
    build:
      context: ./workers/ai
      dockerfile: Dockerfile
    env_file:
      - ./workers/ai/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      AI_CHAT_QUEUE: ai-chat
      AI_CHAT_WORKER_CONCURRENCY: 2
      GEMINI_AI_MODEL: ${GEMINI_AI_MODEL:-gemini-2.5-flash}
      DEEP_SEEK_AI_BASE_URL: ${DEEP_SEEK_AI_BASE_URL:-https://api.deepseek.com}
      DEEP_SEEK_AI_MODEL: ${DEEP_SEEK_AI_MODEL:-deepseek-v4-flash}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-4o-mini}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  ecampus-worker:
    build:
      context: ./workers/ecampus
      dockerfile: Dockerfile
    env_file:
      - ./workers/ecampus/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      ECAMPUS_SCRAPE_QUEUE: ecampus-scrape
      ECAMPUS_SCRAPE_WORKER_CONCURRENCY: 4
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ufam-academics-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
