services:
  redis:
    image: redis:7-alpine
    container_name: ufam-academics-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ufam-academics-postgres
    environment:
      - POSTGRES_USER=ufamacademics
      - POSTGRES_PASSWORD=ufamacademics
      - POSTGRES_DB=ufamacademics
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: ufam-academics-api
    env_file:
      - ./api/.env.local
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://ufamacademics:ufamacademics@postgres:5432/ufamacademics
    depends_on:
      - redis
      - postgres
    ports:
      - '3001:3001'
    restart: unless-stopped

  ai-worker:
    build:
      context: .
      dockerfile: workers/ai/Dockerfile
    container_name: ufam-academics-ai-worker
    env_file:
      - ./workers/ai/.env.local
    depends_on:
      - redis
    restart: unless-stopped

  ecampus-worker:
    build:
      context: .
      dockerfile: workers/ecampus/Dockerfile
    container_name: ufam-academics-ecampus-worker
    env_file:
      - ./workers/ecampus/.env.local
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres-data: