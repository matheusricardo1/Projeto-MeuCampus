services:
  ai-worker:
    build:
      context: ./workers/ai
      dockerfile: Dockerfile
    container_name: ufam-academics-ai-worker
    env_file:
      - ./workers/ai/.env
    restart: unless-stopped

  ecampus-worker:
    build:
      context: ./workers/ecampus
      dockerfile: Dockerfile
    container_name: ufam-academics-ecampus-worker
    env_file:
      - ./workers/ecampus/.env
    restart: unless-stopped

